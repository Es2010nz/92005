<!DOCTYPE html> 
<html> 
<head> 
    <title>Katiaki Zero</title> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1"> 
    <style> 
        * { box-sizing: border-box; margin: 0; padding: 0; } 
        body { font-family: Arial, sans-serif; background-color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; } 
        
        /* Layout Container - Set to 100% for full screen width */ 
        .top-container { 
            width: 100%; 
            max-width: 100%; 
            position: relative; 
            padding: 60px 40px 0 40px; 
        } 
        
        /* Profile/Logo Box - Adjusted position for full screen padding */ 
        .user-icon { position: absolute; top: 10px; left: 40px; width: 40px; height: 40px; border: 1px solid #333; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; } 
        .user-icon img { width: 100%; height: 100%; object-fit: contain; } 
        
        /* Hero Top Banner - Tall full-size design */ 
        .hero-banner { 
            width: 100%; 
            height: 450px; /* Increased from 250px for a premium look */
            border: 1px solid #333; 
            background: #fdfdfd; 
        } 
        
        /* Row of Circles */ 
        .circle-navigation { display: flex; justify-content: space-between; margin: 35px 0; padding: 0 20px; } 
        .nav-circle { width: 55px; height: 55px; border: 1px solid #333; border-radius: 50%; } 
        
        /* Side-by-Side Content Container */ 
        .book-container { display: flex; width: 100%; border: 1px solid #333; margin-bottom: 40px; } 
        
        /* Basic Left and Right Split Columns */ 
        .book-page { flex: 1; padding: 40px; background: #fff; } 
        .book-page.left { border-right: 1px solid #333; } 
        
        /* Basic Inner Box Frame */ 
        .page-img-placeholder { width: 150px; height: 120px; border: 1px solid #333; margin: 0 auto 30px auto; } 
        
        /* Content Text Mock Lines */ 
        .text-line { height: 7px; background: #bbb; margin-bottom: 12px; border-radius: 2px; } 
        .text-line.short { width: 50%; } 
        .text-line.medium { width: 75%; } 
        .text-line.long { width: 95%; } 
        
        /* Basic Bottom Box Frame */ 
        .footer-box { width: 100%; border: 1px solid #333; padding: 25px; margin-bottom: 40px; min-height: 140px; } 
        .footer-link { color: #0056b3; text-decoration: underline; font-size: 12px; word-break: break-all; display: block; margin-bottom: 10px; } 
    </style> 
</head> 
<body> 
    <div class="top-container"> 
         
        <div class="user-icon"> 
            <img src="Logo.png" alt="Logo"> 
        </div> 

        <!-- Large Cinematic Top Banner --> 
        <div class="hero-banner"></div> 
        
        <!-- Expanded Row of Navigation Circles -->
        <div class="circle-navigation">
            <div class="nav-circle"></div>
            <div class="nav-circle"></div>
            <div class="nav-circle"></div>
            <div class="nav-circle"></div>
            <div class="nav-circle"></div>
        </div>

        <!-- Full Width Book Spread Element -->
        <div class="book-container">
            <div class="book-page left">
                <div class="page-img-placeholder"></div>
                <div class="text-line long"></div>
                <div class="text-line medium"></div>
                <div class="text-line short"></div>
            </div>
            <div class="book-page right">
                <div class="page-img-placeholder"></div>
                <div class="text-line long"></div>
                <div class="text-line medium"></div>
                <div class="text-line short"></div>
            </div>
        </div>

        <!-- Bottom Base Footer Box --> 
        <div class="footer-box"> 
            <a href="#" class="footer-link">Link: https://example.com</a> 
        </div> 
    </div> 
</body> 
</html>
